name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Generate icons from SVG
        run: |
          npm install -g @tauri-apps/cli@^2
          tauri icon src-tauri/icons/icon.svg

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FastTask ${{ github.ref_name }}'
          releaseBody: |
            ## Téléchargement

            | Plateforme | Format |
            |---|---|
            | Windows | `.msi` (installeur) · `.exe` (portable) |
            | macOS | `.dmg` (Intel + Apple Silicon universel) |
            | Linux | `.AppImage` · `.deb` |

            > **macOS** : L'app n'est pas signée par Apple. Au premier lancement : clic droit → Ouvrir.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
