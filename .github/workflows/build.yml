name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Desktop : Windows / macOS / Linux ──────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies and generate icons
        run: |
          npm install
          npx tauri icon src-tauri/icons/icon.svg

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FastTask ${{ github.ref_name }}'
          releaseBody: |
            ## Téléchargement

            | Plateforme | Format |
            |---|---|
            | Windows | `.msi` (installeur) · `.exe` (portable) |
            | macOS | `.dmg` (Intel + Apple Silicon universel) |
            | Linux | `.AppImage` · `.deb` |
            | Android | `.apk` |

            > **macOS** : L'app n'est pas signée par Apple. Au premier lancement : clic droit → Ouvrir.
            > **Android** : Activer « Sources inconnues » pour installer l'APK.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ── Android ────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          # Seulement les ABIs des vrais appareils (arm64 + armv7). On retire
          # i686/x86_64 (émulateurs) : ~2x plus rapide à compiler + APK plus légère.
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 27
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Set NDK path
        run: echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install npm dependencies and generate icons
        run: |
          npm install
          npx tauri icon src-tauri/icons/icon.svg

      - name: Init Android project
        run: npx tauri android init

      - name: Build Android APK
        run: npx tauri android build --apk --target aarch64 armv7

      - name: Sign APK
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # build-tools (zipalign + apksigner) : on réutilise celui présent, sinon on l'installe
          BT="$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)"
          if [ -z "$BT" ]; then yes | sdkmanager "build-tools;34.0.0" >/dev/null 2>&1 || true; BT="$ANDROID_HOME/build-tools/34.0.0"; fi
          BT="${BT%/}"; echo "Build-tools: $BT"
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/fasttask.jks"
          UNSIGNED="$(find src-tauri/gen/android -path '*release*' -name '*-unsigned.apk' | head -1)"
          echo "Unsigned APK: $UNSIGNED"
          "$BT/zipalign" -f -p 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          OUT="$RUNNER_TEMP/FastTask_${GITHUB_REF_NAME}_android.apk"
          "$BT/apksigner" sign --ks "$RUNNER_TEMP/fasttask.jks" --ks-pass env:KS_PASS --ks-key-alias "$KEY_ALIAS" --key-pass env:KEY_PASS --out "$OUT" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" verify --print-certs "$OUT" | head -2
          echo "SIGNED_APK=$OUT" >> "$GITHUB_ENV"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.SIGNED_APK }}
